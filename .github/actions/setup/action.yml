name: Setup toolchain
description: Install pnpm + Node from .nvmrc, install dependencies, and build the shared package.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      # Version comes from the "packageManager" field in package.json (also used
      # by Turborepo); do not also pin it here or action-setup errors on the
      # duplicate ("Multiple versions of pnpm specified").
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build shared package
      shell: bash
      run: pnpm build:shared
