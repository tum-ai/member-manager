name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Cancel superseded runs on a branch/PR, but never cancel main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Turborepo remote cache (Vercel). Absent secrets (forks / before setup) simply
# disable remote caching; turbo still runs every task locally, so CI stays green.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # Detect whether a PR touches anything beyond docs / Supabase, so the heavy
  # jobs (browser, Supabase stack, client build) can short-circuit on docs-only
  # changes. Gating happens at the step level inside each job so the job still
  # reports success to branch protection.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
            supabase:
              - 'supabase/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: ./.github/actions/setup
      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: ./.github/actions/setup
      - name: Run typecheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: ./.github/actions/setup
      - name: Build packages
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: ./.github/actions/setup
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: client/coverage/lcov.info,server/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  storybook-test:
    name: Storybook Test
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Chromium
        if: needs.changes.outputs.code == 'true'
        run: pnpm --filter @member-manager/client exec playwright install --with-deps chromium
      - name: Run Storybook interaction + a11y tests
        if: needs.changes.outputs.code == 'true'
        run: pnpm --filter @member-manager/client run test:storybook

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup toolchain
        if: needs.changes.outputs.code == 'true'
        uses: ./.github/actions/setup
      - name: Build client
        if: needs.changes.outputs.code == 'true'
        run: pnpm --filter @member-manager/client build
      - name: Check gzipped bundle size
        if: needs.changes.outputs.code == 'true'
        run: node scripts/check-bundle-size.mjs

  # Aggregates the split jobs back under the legacy required-check name so
  # branch protection ("Lint / Build / Test") stays satisfied without a
  # settings change. Fails if any dependency failed or was cancelled.
  required-checks:
    name: Lint / Build / Test
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck, build, test, storybook-test]
    if: ${{ always() }}
    steps:
      - name: Verify required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2
      - name: Audit workflows with zizmor (advisory)
        # Advisory for now: the workflow baseline still has unpinned-action and
        # pull_request_target findings (run `uvx zizmor .github/workflows`).
        # Promote to a hard gate once those are pinned/addressed (separate PR).
        run: pipx run zizmor --no-progress .github/workflows || true

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Check spelling
        uses: crate-ci/typos@v1.47.2

  migrations:
    name: Supabase Migration Reset
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        if: needs.changes.outputs.supabase == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase stack
        if: needs.changes.outputs.supabase == 'true'
        run: supabase db start

      - name: Rebuild database from migrations
        if: needs.changes.outputs.supabase == 'true'
        run: supabase db reset

  production-migration-drift:
    name: Production Supabase Migration Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link production Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Check production migration drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: node scripts/check-supabase-migrations.mjs --allow-pending-production

  production-migrations:
    name: Production Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link production Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply production migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --yes --password "$SUPABASE_DB_PASSWORD"

      - name: Assert production migration parity
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: node scripts/check-supabase-migrations.mjs
