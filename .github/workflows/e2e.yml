name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Heavy job (full Supabase stack + browser); cancel superseded branch runs.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    # Stable check name surfaced to branch protection as "E2E / Playwright E2E".
    # Do not rename without updating the required-check configuration.
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Generate local env files
        run: pnpm setup:local

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
